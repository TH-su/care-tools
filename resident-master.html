<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<!-- 機微情報を含むためキャッシュ無効 -->
<meta http-equiv="Cache-Control" content="no-store">
<meta name="robots" content="noindex,nofollow">
<title>入居者マスタ</title>
<style>
:root{
  --pri:#1a73e8; --pri-l:#e8f0fe; --pri-d:#1557b0;
  --ok:#2e7d32; --ok-l:#e8f5e9; --ng:#c62828; --ng-l:#ffebee;
  --warn-bg:#fff8e1; --warn-tx:#e65100;
  --g0:#f8f9fa; --g1:#f1f3f4; --g2:#e8eaed; --g3:#dadce0;
  --g5:#9aa0a6; --g6:#80868b; --g7:#5f6368; --g9:#202124;
  --r:12px; --sh:0 1px 6px rgba(0,0,0,.12);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",Meiryo,sans-serif;
  background:var(--g0); color:var(--g9); font-size:15px; line-height:1.5; padding-bottom:72px;}
button{font-family:inherit; cursor:pointer}
input,select,textarea{font-family:inherit; font-size:15px}

/* ── ヘッダー ── */
.hdr{position:sticky; top:0; z-index:50; background:var(--pri); color:#fff;
  padding:10px 14px; display:flex; align-items:center; gap:10px; box-shadow:var(--sh)}
.hdr h1{font-size:17px; margin:0; font-weight:700; flex:1}
.hdr .sync{font-size:12px; background:rgba(255,255,255,.18); padding:3px 9px; border-radius:14px; white-space:nowrap}
.hdr .sync.ok{background:rgba(46,125,50,.9)} .hdr .sync.err{background:rgba(198,40,40,.95)}

/* ── 画面切替 ── */
.scr{display:none; padding:14px; max-width:980px; margin:0 auto}
.scr.on{display:block}

/* ── カード ── */
.cd{background:#fff; border-radius:var(--r); box-shadow:var(--sh); padding:14px; margin-bottom:12px}

/* ── 一覧 ── */
.search-bar{display:flex; gap:8px; margin-bottom:12px; align-items:center}
.search-bar input{flex:1; padding:10px 12px; border:1px solid var(--g3); border-radius:10px}
.filter-row{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px}
.chip{padding:5px 12px; border:1px solid var(--g3); border-radius:16px; background:#fff; font-size:13px; color:var(--g7)}
.chip.on{background:var(--pri); color:#fff; border-color:var(--pri)}
/* ── 表示パターンのタブ（並べ方だけを変える。検索・在籍フィルタは全タブで有効） ── */
.view-tabs{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; border-bottom:2px solid var(--g2)}
.vtab{min-height:44px; padding:8px 14px; border:none; border-bottom:3px solid transparent; margin-bottom:-2px;
      background:none; font-size:14px; font-weight:700; color:var(--g6); cursor:pointer}
.vtab.on{color:var(--pri); border-bottom-color:var(--pri)}
.vtab:hover{color:var(--pri)}
.vtab:focus-visible{outline:2px solid var(--pri); outline-offset:-2px; border-radius:6px}
/* 区画（1階/2階/五十音の各行）の見出しと中身 */
.rsec{margin-bottom:18px}
.rsec>h3{font-size:14px; font-weight:700; color:var(--g7); margin:0 0 8px;
         padding:6px 10px; background:var(--g1); border-left:4px solid var(--pri); border-radius:0 6px 6px 0}
.rsec>h3 .cnt{font-weight:400; color:var(--g7); font-size:12px; margin-left:6px}
.roster-count{font-size:12px; color:var(--g7); margin-bottom:8px}
/* 階が判定できない人を黙って落とさないための区画（居室未登録など）。色で他と区別する */
.rsec.nofloor>h3{border-left-color:var(--warn-tx); background:var(--warn-bg)}
/* 階別（左右）: 1階と2階を横並びに1列ずつ */
.fl-2col{display:grid; grid-template-columns:1fr 1fr; gap:14px; align-items:start}
.fl-2col .rsec{margin-bottom:0}
.fl-2col .rlist{grid-template-columns:1fr}
/* 階別（4列）: 1階を4列 → その下に2階を4列 */
.fl-4col .rlist{grid-template-columns:repeat(4,1fr)}
/* 画面が狭い時は列数を落とす（スマホで4列・2分割は実用にならない） */
@media(max-width:900px){ .fl-4col .rlist{grid-template-columns:repeat(2,1fr)} }
@media(max-width:640px){
  .fl-2col{grid-template-columns:1fr}
  .fl-2col .rsec{margin-bottom:18px}
  .fl-4col .rlist{grid-template-columns:1fr}
}
.rlist{display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:10px}
.rcard{background:#fff; border:1px solid var(--g2); border-radius:10px; padding:12px; cursor:pointer; transition:.12s}
.rcard:hover{box-shadow:var(--sh); border-color:var(--pri)}
.rcard .nm{font-size:16px; font-weight:700}
.rcard .kn{font-size:11px; color:var(--g6)}
.rcard .meta{margin-top:6px; display:flex; gap:6px; flex-wrap:wrap}
.tag{font-size:11px; padding:2px 8px; border-radius:10px; background:var(--g1); color:var(--g7)}
/* 追加情報のタグ。既存の居室(room)・介護度(care)・退去(out)の色は変えない */
.tag.bd,.tag.ht,.tag.wt{background:var(--g0); color:var(--g7); border:1px solid var(--g2)}
.tag.care{background:var(--pri-l); color:var(--pri-d)} .tag.room{background:#ede7f6; color:#5e35b1}
.tag.out{background:var(--ng-l); color:var(--ng)}
.empty{text-align:center; color:var(--g5); padding:40px 10px}

/* ── 詳細（印刷レイアウト） ── */
.sheet{background:#fff; border:2px solid var(--g9); border-radius:6px; overflow:hidden}
.sheet .sec{display:flex; border-top:1px solid var(--g9)}
.sheet .sec:first-child{border-top:none}
.sheet .sec-lbl{writing-mode:vertical-rl; text-orientation:upright; background:var(--g1);
  border-right:1px solid var(--g9); padding:8px 4px; font-weight:700; font-size:13px; min-width:34px;
  display:flex; align-items:center; justify-content:center; letter-spacing:2px}
.sheet .sec-body{flex:1; min-width:0}
.grid{display:grid; gap:0}
.cell{border-right:1px solid var(--g3); border-bottom:1px solid var(--g3); padding:6px 8px; min-width:0}
.cell:last-child{border-right:none}
.cell .lab{font-size:11px; color:var(--g6); display:block; margin-bottom:2px}
.cell .val{font-size:15px; word-break:break-word; white-space:pre-wrap}
.cell .val.big{font-size:18px; font-weight:700}
.row-cells{display:flex; flex-wrap:wrap}
.row-cells .cell{flex:1}
.fulltext{white-space:pre-wrap; word-break:break-word; font-size:14px; line-height:1.6}
.rhythm{display:flex; flex-wrap:wrap; gap:4px 14px; font-size:14px}
.rhythm span b{color:var(--pri-d)}

.detail-actions{display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap}
.btn{padding:10px 16px; border:none; border-radius:10px; font-size:14px; font-weight:700; min-height:44px}
.btn-pri{background:var(--pri); color:#fff} .btn-ok{background:var(--ok); color:#fff}
.btn-sec{background:#fff; color:var(--pri); border:1px solid var(--pri)}
.btn-gray{background:var(--g2); color:var(--g7)} .btn-ng{background:#fff;color:var(--ng);border:1px solid var(--ng)}
.btn:disabled{opacity:.5}

/* ── 編集フォーム ── */
.fgroup{margin-bottom:18px}
.fgroup h3{font-size:14px; color:var(--pri-d); border-left:4px solid var(--pri); padding-left:8px; margin:0 0 10px}
.fgrid{display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:10px}
.fld{display:flex; flex-direction:column}
.fld.wide{grid-column:1/-1}
.fld label{font-size:12px; color:var(--g7); margin-bottom:3px}
.fld input,.fld select,.fld textarea{padding:9px 10px; border:1px solid var(--g3); border-radius:8px; width:100%}
.fld textarea{min-height:72px; resize:vertical}
.fam-row{display:grid; grid-template-columns:1fr 1fr; gap:6px; border:1px solid var(--g2); border-radius:8px; padding:8px; margin-bottom:8px}
.fam-row .full{grid-column:1/-1}
.fam-del{justify-self:end; background:none; border:none; color:var(--ng); font-size:13px}

/* ── ボトムナビ ── */
.bnav{position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid var(--g2);
  display:flex; z-index:50; box-shadow:0 -1px 6px rgba(0,0,0,.08)}
.bnav button{flex:1; border:none; background:none; padding:8px 4px; font-size:11px; color:var(--g6);
  display:flex; flex-direction:column; align-items:center; gap:2px; min-height:56px; justify-content:center}
.bnav button.on{color:var(--pri)} .bnav button .ic{font-size:20px}

/* ── トースト ── */
#toast{position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(20px);
  background:var(--g9); color:#fff; padding:10px 18px; border-radius:22px; font-size:14px; z-index:200;
  opacity:0; transition:.25s; pointer-events:none; max-width:90%; text-align:center}
#toast.on{opacity:1; transform:translateX(-50%) translateY(0)}

/* ── モーダル ── */
.modal{position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:150; display:none; align-items:center; justify-content:center; padding:16px}
.modal.on{display:flex}
.modal .box{background:#fff; border-radius:var(--r); max-width:520px; width:100%; max-height:88vh; overflow:auto; padding:18px}
.modal h2{font-size:16px; margin:0 0 12px}
.applead{font-size:12px; color:var(--g7); margin:0 0 12px; line-height:1.6}
.applist{display:grid; gap:8px}
.applist a{display:flex; align-items:center; gap:10px; min-height:52px; padding:10px 14px;
  border:1px solid var(--g2); border-radius:10px; background:#fff; color:var(--g9);
  text-decoration:none; font-size:14px; font-weight:700}
.applist a:hover{border-color:var(--pri); background:var(--pri-l)}
.applist a:focus-visible{outline:2px solid var(--pri); outline-offset:2px}
.applist .ai{font-size:20px; line-height:1; flex:0 0 auto}
.applist .at{display:flex; flex-direction:column; gap:2px; min-width:0}
.applist .ad{font-size:11px; font-weight:400; color:var(--g7); line-height:1.4}
.muted{color:var(--g6); font-size:12px}

/* ── 印刷 ── */
@media print{
  body{padding:0; background:#fff}
  .hdr,.bnav,.detail-actions,#toast,.modal{display:none !important}
  .scr{padding:0; max-width:none}
  .scr:not(.on){display:none}
  .sheet{border:2px solid #000; page-break-inside:avoid}
  .sheet .sec{border-top:1px solid #000}
  .cell{border-color:#999}
  .geno-box{border:none !important; cursor:default !important}
  .geno-hint{display:none !important}
  @page{size:A4; margin:10mm}
}
.loading{text-align:center; color:var(--g5); padding:30px}
</style>
</head>
<body>

<div class="hdr">
  <h1>🗂️ 入居者マスタ</h1>
  <span class="sync" id="syncStatus">未接続</span>
</div>

<!-- ════════ 一覧 ════════ -->
<section class="scr on" id="sc-list">
  <div class="search-bar">
    <input type="search" id="q" placeholder="氏名・ふりがな・居室で検索" autocomplete="off">
  </div>
  <div class="view-tabs" id="viewTabs" role="tablist" aria-label="表示パターン">
    <button class="vtab on" data-v="std"   role="tab" aria-selected="true">標準</button>
    <button class="vtab"    data-v="fl2"   role="tab" aria-selected="false">階別（左右）</button>
    <button class="vtab"    data-v="fl4"   role="tab" aria-selected="false">階別（4列）</button>
    <button class="vtab"    data-v="kana"  role="tab" aria-selected="false">五十音</button>
  </div>
  <div class="filter-row" id="filterRow">
    <button class="chip on" data-f="active">在籍</button>
    <button class="chip" data-f="out">退去</button>
    <button class="chip" data-f="all">すべて</button>
  </div>
  <!-- 件数だけを読み上げる。rosterBox 自体を aria-live にすると検索1打鍵ごとに
       137名分の氏名・居室が読み上げられ、スクリーンリーダーで検索が使えなくなる -->
  <div id="rosterCount" class="roster-count" role="status" aria-live="polite"></div>
  <div id="rosterBox" role="tabpanel"><div class="loading">読み込み中…</div></div>
</section>

<!-- ════════ 詳細（印刷ページ） ════════ -->
<section class="scr" id="sc-view">
  <div class="detail-actions">
    <button class="btn btn-gray" id="backBtn">← 一覧</button>
    <button class="btn btn-pri" id="editBtn">✏️ 編集</button>
    <button class="btn btn-sec" id="printBtn">🖨️ 印刷</button>
  </div>
  <div id="viewBox"><div class="loading">読み込み中…</div></div>
</section>

<!-- ════════ 編集 ════════ -->
<section class="scr" id="sc-edit">
  <div class="detail-actions">
    <button class="btn btn-gray" id="editCancel">← 取消</button>
    <button class="btn btn-ok" id="saveBtn">💾 保存</button>
  </div>
  <div id="editBox"></div>
</section>

<!-- ボトムナビ -->
<nav class="bnav">
  <button class="on" data-sc="list"><span class="ic">📋</span>一覧</button>
  <button data-sc="new"><span class="ic">➕</span>新規</button>
  <button data-sc="sync"><span class="ic">☁️</span>同期設定</button>
  <button data-sc="apps"><span class="ic">🔗</span>アプリ</button>
</nav>

<!-- 同期設定モーダル -->
<!-- アプリ横断リンク。入居者マスタをハブに各アプリへ飛ぶ（別タブ＝作業中の画面を失わない）。
     訪問診療は別オリジン・端末依存のため、URLが設定されている時だけ表示する。 -->
<div class="modal" id="mApps">
  <div class="box">
    <h2>🔗 アプリを開く</h2>
    <p class="applead">入居者情報の源泉はこの入居者マスタです。各アプリはここの名簿を読み込みます。</p>
    <div id="appList" class="applist"></div>
    <div class="mact"><button class="btn btn-gray" id="appsClose">閉じる</button></div>
  </div>
</div>

<div class="modal" id="mSync">
  <div class="box">
    <h2>☁️ クラウド同期設定</h2>
    <div class="fld" style="margin-bottom:10px">
      <label>この端末の用途</label>
      <select id="cfgDeviceRole">
        <option value="office">事務所PC（全機能を使用）</option>
        <option value="field">現場タブレット（入居者マスタは使用不可）</option>
      </select>
    </div>
    <div class="fld" style="margin-bottom:10px">
      <label>GAS Web App URL</label>
      <input id="cfgUrl" placeholder="https://script.google.com/macros/s/..../exec">
    </div>
    <div class="fld" style="margin-bottom:10px">
      <label>アクセストークン</label>
      <input id="cfgToken" placeholder="GASのスクリプトプロパティと一致させる">
    </div>
    <div class="fld" style="margin-bottom:10px">
      <label>訪問診療アプリURL（任意）</label>
      <input id="cfgVmaUrl" placeholder="http://（別サイトのため端末ごとに異なります）">
    </div>
    <p class="muted">URL・トークンはこの端末にのみ保存され、入居者の機微情報は端末に残しません。<br>
      訪問診療アプリは別サイトのため、URLを登録した端末でだけ「🔗アプリ」に表示されます。</p>
    <div class="detail-actions" style="margin-top:14px">
      <button class="btn btn-gray" id="syncClose">閉じる</button>
      <button class="btn btn-sec" id="syncTest">接続テスト</button>
      <button class="btn btn-ok" id="syncSave">保存して再読込</button>
    </div>
  </div>
</div>

<!-- 端末用途ガード（現場タブレットでは入居者マスタを表示しない＝事務所PC専用） -->
<div class="modal" id="deviceBlock">
  <div class="box" style="text-align:center;max-width:440px">
    <div style="font-size:44px;margin-bottom:8px">🔒</div>
    <h2 style="justify-content:center">この端末は現場用に設定されています</h2>
    <p class="muted" style="font-size:14px;line-height:1.7">入居者マスタは要配慮個人情報（医療・家族連絡先など）を含むため、<b>事務所PC</b>でご利用ください。</p>
    <div class="detail-actions" style="justify-content:center;margin-top:16px">
      <button class="btn btn-gray" id="deviceUnlock">管理者の方（端末設定を変更）</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════════════════
   入居者マスタ / 管理アプリ
   - 保存先: Google スプレッドシート + GAS Web App（トークン認証）
   - 機微情報（医療・家族連絡先等）は localStorage に保存しない
   - 一覧/検索用の roster（id/氏名/ふりがな/居室/介護度）のみ端末キャッシュ
   - 描画は全て esc() でエスケープ（XSS防止）。保存はホワイトリスト方式
   ─ 他アプリ連携用 API（GAS）─
     GET  ?action=getRoster&token=..[&since=ISO]   → 軽量リスト
     GET  ?action=getResident&id=..&token=..        → 個人フル
     GET  ?action=getSection&id=..&section=medical&token=..
     POST {action:'saveResident', token, record}    → upsert
   ═══════════════════════════════════════════════════════════════ */

/* ── 設定（端末ローカル。機微情報ではない） ── */
var CFG_KEY='rmaster_cfg';
var ROSTER_KEY='rmaster_roster'; // 一覧・検索用のキャッシュ（氏名・居室・介護度・生年月日・身長）。
                                 // 病名・処方・家族連絡先などは保存しない。事務所端末専用。
var CFG={url:'', token:'', vmaUrl:''};
(function loadCfg(){try{var s=localStorage.getItem(CFG_KEY);if(s){var o=JSON.parse(s);CFG.url=o.url||'';CFG.token=o.token||'';CFG.vmaUrl=o.vmaUrl||''}}catch(e){}})();

/* ── 端末の用途（事務所PC専用ガード。全管理系アプリ共通の同一オリジンキー） ──
   'field'（現場タブレット）の端末では入居者マスタを表示しない（誤操作防止・機微情報の非表示）。
   未設定/'office' は従来どおり全機能。あくまで運用上の誤操作防止であり厳密な認証ではない。 */
var DEVICE_KEY='su_device_role';
function getDeviceRole(){try{return localStorage.getItem(DEVICE_KEY)||'office'}catch(e){return'office'}}
function setDeviceRole(v){
  try{
    localStorage.setItem(DEVICE_KEY,v);
    /* ★現場端末に切り替えたら一覧キャッシュを消す。
       画面は applyDeviceGuard でブロックされるが、キャッシュを残すと
       端末内に氏名・生年月日が残り続けるため。 */
    if(v==='field'){ localStorage.removeItem(ROSTER_KEY); roster=[]; }
  }catch(e){}
}

/* ── ジェノグラム（家系図）連携 ──
   家系図アプリが保存した画像を同一オリジンの共有キー su_genograms（{[masterId]:{image,updatedAt}}）
   から読み、マスタの表示欄に出す。欄クリックで家系図アプリ（resident=masterId 付き）へ遷移し作成/編集。 */
var SU_GENO_KEY='su_genograms';
var GENOGRAM_APP='genogram.html'; // 家系図アプリのパス（用意でき次第ここを合わせる）
function getGenogram(id){
  try{var raw=localStorage.getItem(SU_GENO_KEY);if(!raw)return null;var m=JSON.parse(raw);var g=m&&m[String(id)];return(g&&g.image)?g.image:null}catch(e){return null}
}
function openGenogram(id,name){
  if(id==null)return;
  location.href=GENOGRAM_APP+'?resident='+encodeURIComponent(id)+(name?'&name='+encodeURIComponent(name):'');
}

/* ── ユーティリティ ── */
function $(id){return document.getElementById(id)}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function toast(m){var t=$('toast');t.textContent=m;t.classList.add('on');clearTimeout(toast._t);toast._t=setTimeout(function(){t.classList.remove('on')},2600)}
function setSync(txt,cls){var e=$('syncStatus');e.textContent=txt;e.className='sync'+(cls?(' '+cls):'')}

function todayISO(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function fmtJDate(iso){if(!iso)return'';var p=String(iso).slice(0,10).split('-');if(p.length<3)return iso;return p[0]+'年'+parseInt(p[1],10)+'月'+parseInt(p[2],10)+'日'}
function calcAge(birthISO){if(!birthISO)return'';var b=new Date(birthISO);if(isNaN(b))return'';var n=new Date();var a=n.getFullYear()-b.getFullYear();var m=n.getMonth()-b.getMonth();if(m<0||(m===0&&n.getDate()<b.getDate()))a--;return a>=0&&a<140?a:''}
function calcBMI(h,w){h=parseFloat(h);w=parseFloat(w);if(!h||!w)return'';var b=w/Math.pow(h/100,2);return isFinite(b)?b.toFixed(1):''}
function calcStayDays(adm,dis){if(!adm)return'';var a=new Date(adm);if(isNaN(a))return'';var end=dis?new Date(dis):new Date();var d=Math.floor((end-a)/86400000);return d>=0?d:''}

/* ═══════════ API（トークン付き・タイムアウト・エラー処理） ═══════════ */
function apiGet(params,timeoutMs){
  if(!CFG.url)return Promise.reject(new Error('NO_URL'));
  var qs=Object.keys(params).map(function(k){return encodeURIComponent(k)+'='+encodeURIComponent(params[k])}).join('&');
  qs+='&token='+encodeURIComponent(CFG.token);
  return fetchWithTimeout(CFG.url+'?'+qs,{method:'GET'},timeoutMs||12000).then(parseJson);
}
function apiPost(body,timeoutMs){
  if(!CFG.url)return Promise.reject(new Error('NO_URL'));
  body.token=CFG.token;
  // text/plain で送信（GAS の CORS プリフライト回避）
  return fetchWithTimeout(CFG.url,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(body)},timeoutMs||15000).then(parseJson);
}
function fetchWithTimeout(url,opt,ms){
  return new Promise(function(res,rej){
    var ctl=('AbortController'in window)?new AbortController():null;
    if(ctl)opt.signal=ctl.signal;
    var t=setTimeout(function(){if(ctl)ctl.abort();rej(new Error('タイムアウト'))},ms);
    fetch(url,opt).then(function(r){clearTimeout(t);res(r)}).catch(function(e){clearTimeout(t);rej(e)});
  });
}
function parseJson(r){return r.text().then(function(t){var d;try{d=JSON.parse(t)}catch(e){throw new Error('応答が不正です')}if(d&&d.error)throw new Error(d.error);return d})}

/* ═══════════ 最新体重（体重管理アプリのデータを読むだけ・向こうは一切変更しない） ═══════════
   同一オリジン（th-su.github.io）なので localStorage を直接読める。
   ★体重の正本は体重管理アプリ。マスタ側の weight は移行時の静的値で古いため使わない。
   ★rec.weight は車椅子控除済みの正味体重（weight-record.html で保存時に計算済み）。補正しない。 */
var WTMGR_KEY='wtmgr_v1';
/* 氏名の正規化は weight-record.html:2248 の suNormName と同一仕様にする。
   ここがズレると名寄せが外れて別人の体重が付く。 */
function wtNormName(s){ return String(s==null?'':s).replace(/\s+/g,'').trim(); }
/* 最新判定のソートキーも weight-record.html:2072-2075 の recDateKey と同一仕様。 */
function wtRecKey(r){ return (r.measuredOn||(r.yearMonth?r.yearMonth+'-01':''))+'#'+(r.createdAt||''); }

/* 体重アプリの localStorage から「uidごとの最新1件」と名寄せ索引を作る。
   体重アプリ未使用の端末・壊れたJSONでは空を返す（一覧は従来どおり表示される）。 */
var _wtRaw=null,_wtCache=null;
function loadWeightSource(){
  var empty={latest:{},midByUid:{},uidByName:{}};
  var db,raw;
  try{
    raw=localStorage.getItem(WTMGR_KEY);
    if(!raw){ _wtRaw=null;_wtCache=null; return empty; }
    /* ★検索は1打鍵ごとに renderRoster を呼ぶ。体重DBはMB級になりうるため
       生文字列が同じ間は再parseしない（打鍵ごとの遅延を出さない）。 */
    if(raw===_wtRaw && _wtCache) return _wtCache;
    db=JSON.parse(raw);
  }catch(e){ return empty; }
  if(!db||!Array.isArray(db.residents)||!Array.isArray(db.records)) return empty;

  var midByUid={}, nameCount={}, uidOfName={};
  db.residents.forEach(function(p){
    if(!p||p.id==null) return;
    if(p.masterId!=null&&p.masterId!=='') midByUid[String(p.id)]=String(p.masterId);
    var n=wtNormName(p.name);
    if(n){ nameCount[n]=(nameCount[n]||0)+1; uidOfName[n]=String(p.id); }
  });
  var latest={};
  db.records.forEach(function(rec){
    if(!rec||rec.residentId==null) return;
    /* ★体重アプリは数値化に失敗した体重を 0 に丸めて保存する（normalizeRecord）。
       0 を最新値として拾うと「0kg」がカードに出るため、入力バリデーションと同じ
       20〜150kg の範囲外は最新判定から除外する。 */
    var wv=Number(rec.weight);
    if(!isFinite(wv)||wv<20||wv>150) return;
    var uid=String(rec.residentId), k=wtRecKey(rec);
    if(!latest[uid]||k>latest[uid].k) latest[uid]={k:k,weight:wv,on:rec.measuredOn||rec.yearMonth||''};
  });
  /* ★同姓同名が複数いる氏名は名寄せに使わない（別人の体重が付くのを防ぐ）。 */
  var uidByName={};
  Object.keys(nameCount).forEach(function(n){ if(nameCount[n]===1) uidByName[n]=uidOfName[n]; });
  _wtRaw=raw; _wtCache={latest:latest, midByUid:midByUid, uidByName:uidByName};
  return _wtCache;
}

/* 表示中の一覧に対して {masterId: {weight,on}} を作る。 */
function buildWeightIndex(list){
  var idx={}, src=loadWeightSource(), used={};
  // ① masterId 一致（確実な紐付けを優先）
  Object.keys(src.midByUid).forEach(function(uid){
    var w=src.latest[uid], mid=src.midByUid[uid];
    if(!w) return;
    /* 同じ masterId の体重アプリ側レコードが2件ある場合は新しい方を採る
       （列挙順に依存して古い方が勝つのを防ぐ） */
    if(!idx[mid]||w.k>idx[mid].k) idx[mid]=w;
    used[uid]=true;
  });
  /* ★マスタ側の同姓同名も除外する。ここを list（検索・在籍で絞った後）で数えると
     検索文字列によって紐づく相手が変わるため、必ず roster 全体で数える。 */
  var dup={};
  roster.forEach(function(r){ var n=wtNormName(r.name); if(n) dup[n]=(dup[n]||0)+1; });
  // ② 氏名の正規化一致（体重アプリ側に masterId が無い人向け）
  list.forEach(function(r){
    if(idx[String(r.id)]) return;
    var n=wtNormName(r.name);
    if(!n||dup[n]!==1) return;          // マスタ側に同名が複数 → 紐づけない
    var uid=src.uidByName[n];
    if(!uid||used[uid]) return;
    var w=src.latest[uid];
    if(w){ idx[String(r.id)]=w; used[uid]=true; }
  });
  return idx;
}

/* 居室 → 階。daycare-roster.html の roomToFloor と同一仕様（判定を2箇所でずらさない）。
   全角数字は半角へ寄せる（自由テキスト欄のため "２０１" の混入がありうる）。
   0 = 階を判定できない（居室未登録・1/2以外で始まる） */
function roomToFloor(room){
  var s=String(room==null?'':room).trim()
    .replace(/[０-９]/g,function(c){return String.fromCharCode(c.charCodeAt(0)-0xFEE0)});
  var m=s.match(/^([12])/);
  return m?parseInt(m[1],10):0;
}
/* 居室番号の数値順（"99" より "101" が後ろ。文字列比較だと逆になる） */
function roomNo(room){
  var s=String(room==null?'':room).replace(/[０-９]/g,function(c){return String.fromCharCode(c.charCodeAt(0)-0xFEE0)});
  var m=s.match(/\d+/); return m?parseInt(m[0],10):9e15;   // 居室番号なし＝末尾へ（ES5 のため MAX_SAFE_INTEGER は使わない）
}
function byRoom(a,b){ return roomNo(a.room)-roomNo(b.room)
  || String(a.kana||'').localeCompare(String(b.kana||''),'ja'); }
function byKana(a,b){ return String(a.kana||a.name||'').localeCompare(String(b.kana||b.name||''),'ja'); }

/* 五十音の行分け。ヨミの先頭文字を清音・大書き・ひらがなに正規化してから分類する。
   （ヤマダ/やまだ→や行、が→か行、ぱ→は行、ぁ→あ行） */
var KANA_BASE={'が':'か','ぎ':'き','ぐ':'く','げ':'け','ご':'こ','ざ':'さ','じ':'し','ず':'す','ぜ':'せ','ぞ':'そ',
  'だ':'た','ぢ':'ち','づ':'つ','で':'て','ど':'と','ば':'は','び':'ひ','ぶ':'ふ','べ':'へ','ぼ':'ほ',
  'ぱ':'は','ぴ':'ひ','ぷ':'ふ','ぺ':'へ','ぽ':'ほ','ゔ':'う',
  /* 旧かな・小書き。ヰ/ヱ/ヵ/ヶ もカタカナ→ひらがな変換後にここへ落ちる。
     現代仮名遣いの読みに合わせる（ゐ→い・ゑ→え）。高齢入居者の名簿では実際に起こりうる */
  'ゐ':'い','ゑ':'え','ゕ':'か','ゖ':'け',
  'ぁ':'あ','ぃ':'い','ぅ':'う','ぇ':'え','ぉ':'お','っ':'つ','ゃ':'や','ゅ':'ゆ','ょ':'よ','ゎ':'わ'};
var KANA_ROWS=[['あ行','あいうえお'],['か行','かきくけこ'],['さ行','さしすせそ'],['た行','たちつてと'],
  ['な行','なにぬねの'],['は行','はひふへほ'],['ま行','まみむめも'],['や行','やゆよ'],
  ['ら行','らりるれろ'],['わ行','わをん']];
/* 半角カタカナ → ひらがな（0xFF66「ｦ」起点の並び順そのまま）。
   長年運用のスプレッドシートは半角カナが混ざりうる。寄せないと「その他」に落ちる。 */
var KANA_HALF='をぁぃぅぇぉゃゅょっーあいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわん';
function kanaRowOf(r){
  var s=String(r.kana||'').trim();
  if(!s) return '';                                  // ヨミが無い人は「その他」へ（落とさない）
  var c=s.charAt(0);
  var cd=c.charCodeAt(0);
  if(cd>=0x30A1&&cd<=0x30F6) c=String.fromCharCode(cd-0x60);      // 全角カタカナ→ひらがな
  else if(cd>=0xFF66&&cd<=0xFF9D) c=KANA_HALF.charAt(cd-0xFF66);  // 半角カタカナ→ひらがな
  c=KANA_BASE[c]||c;
  for(var i=0;i<KANA_ROWS.length;i++){ if(KANA_ROWS[i][1].indexOf(c)>=0) return KANA_ROWS[i][0]; }
  return '';                                         // ひらがな以外（英字等）も「その他」へ
}
/* 1人分のカード。全タブで同じ見た目にする（一貫性） */
function rcardHtml(r){
  /* ★既存の居室・介護度・退去タグの並びは動かさない（現場の見慣れた順序を壊さない）。
     生年月日・身長・体重はその後ろに足し、値が無い項目はタグごと出さない。 */
  var w=weightIdx[String(r.id)];
  return '<div class="rcard" data-id="'+esc(r.id)+'">'+
    '<div class="nm">'+esc(r.name)+'</div>'+
    (r.kana?'<div class="kn">'+esc(r.kana)+'</div>':'')+
    '<div class="meta">'+
      (r.room?'<span class="tag room">'+esc(r.room)+'号室</span>':'')+
      (r.careLevel?'<span class="tag care">'+esc(r.careLevel)+'</span>':'')+
      (r.active===false?'<span class="tag out">退去</span>':'')+
      (r.birthDate?'<span class="tag bd">'+esc(fmtJDate(r.birthDate))+'生</span>':'')+
      (r.height?'<span class="tag ht">'+esc(r.height)+'cm</span>':'')+
      (w?'<span class="tag wt" title="この端末の体重管理アプリにある最新値（同期状況により古い場合があります）">'+esc(w.weight)+'kg'+(w.on?'（'+esc(String(w.on).slice(0,10))+'）':'')+'</span>':'')+
    '</div></div>';
}
function secHtml(title,people,extraClass){
  if(!people.length) return '';                      // 該当者ゼロの区画は見出しごと出さない

    '<span class="cnt">'+people.length+'名</span></h3><div class="rlist">'+

function renderRoster(){
  var q=($('q').value||'').trim().toLowerCase();
  var box=$('rosterBox');
  var list=roster.filter(function(r){
    if(curFilter==='active'&&r.active===false)return false;
    if(curFilter==='out'&&r.active!==false)return false;
    if(q){var hay=((r.name||'')+' '+(r.kana||'')+' '+(r.room||'')).toLowerCase();if(hay.indexOf(q)<0)return false}
    return true;
  }).sort(function(a,b){return String(a.room||'').localeCompare(String(b.room||''),'ja')||String(a.kana||'').localeCompare(String(b.kana||''),'ja')});
  /* 体重の索引は描画のたびに作り直す。体重アプリで記録した後、再読込すれば反映される。
     体重アプリ未使用の端末では空になり、体重タグが出ないだけで一覧は従来どおり出る。 */
  try{ weightIdx=buildWeightIndex(list); }catch(e){ weightIdx={}; }   // 体重が出ないだけで一覧は必ず描画する
  var cntEl=$('rosterCount');
  if(cntEl) cntEl.textContent=list.length?(list.length+'名'):'';
  if(!list.length){box.innerHTML='<div class="empty">'+(roster.length?'該当する入居者がいません':'入居者がいません。「同期設定」でURLを設定するか「新規」で登録してください')+'</div>';return}
  var html;
  if(curView==='fl2'||curView==='fl4'){
    /* ★階が判定できない人（居室未登録等）を必ず「階未設定」として出す。
       落とすと画面から消え、誰も気づけない（daycare-roster と同じ方針）。 */
    var f1=[],f2=[],f0=[];
    list.forEach(function(r){var f=roomToFloor(r.room);(f===1?f1:f===2?f2:f0).push(r)});
    f1.sort(byRoom); f2.sort(byRoom); f0.sort(byKana);
    var s1=secHtml('１階入居者',f1), s2=secHtml('２階入居者',f2),
        s0=secHtml('階未設定（居室が未登録・1/2以外で始まる）',f0,'nofloor');
    html=(curView==='fl2')
      // 左右に1列ずつ。階未設定はその下に全幅で。
      // ★片側が0名でも空の div を置く。置かないと残った側が左列に寄り「左=1階」が崩れる
      ? '<div class="fl-2col">'+(s1||'<div></div>')+(s2||'<div></div>')+'</div>'+s0
      : '<div class="fl-4col">'+s1+s2+s0+'</div>';    // 上に1階4列・下に2階4列
  }else if(curView==='kana'){
    var bucket={},other=[];
    list.forEach(function(r){var k=kanaRowOf(r); if(!k){other.push(r);return} (bucket[k]=bucket[k]||[]).push(r)});
    html=KANA_ROWS.map(function(p){
      var a=bucket[p[0]]; if(!a) return '';
      return secHtml(p[0],a.sort(byKana));
    }).join('')+secHtml('その他',other.sort(byKana),'nofloor');   // ヨミ未登録・五十音で分類できないヨミ
  }else{
    html='<div class="rlist">'+list.map(rcardHtml).join('')+'</div>';
  }
  box.innerHTML=html;
  Array.prototype.forEach.call(box.querySelectorAll('.rcard'),function(el){
    el.addEventListener('click',function(){openResident(this.getAttribute('data-id'))});
  });
}

var curResident=null;
function openResident(id){
  showScreen('view');
  $('viewBox').innerHTML='<div class="loading">読み込み中…</div>';
  if(!CFG.url){$('viewBox').innerHTML='<div class="empty">同期設定のURLが未設定です</div>';return}
  apiGet({action:'getResident',id:id}).then(function(d){
    var rec=(d&&d.record)||d;
    if(!rec||rec.id==null){throw new Error('該当データなし')}
    curResident=rec; renderView(rec);
  }).catch(function(e){$('viewBox').innerHTML='<div class="empty">取得に失敗しました: '+esc(e.message)+'</div>'});
}

var editing=null;
/* 未知値の救済（データ消失防止）:
   select の選択肢に無い既存値は、どの option にも selected が付かず先頭の空 option が選ばれ、
   編集画面を開いて保存しただけで値が空になって消える。同様に type=date は ISO 形式でない値を
   受け付けず空表示になり保存で消える。いずれも警告が出ない無言の消失なので、
   未知値は「（既存値）」付きの option として足す／date は text にフォールバックして必ず保持する。 */
function isISODate(s){return /^\d{4}-\d{2}-\d{2}$/.test(String(s||''))}
function dtype(v){return (v&&!isISODate(v))?'text':'date'}
function fld(k,label,val,type,opts){
  var v=esc(val==null?'':val);
  var wide=(type==='textarea');
  if(type==='select'){
    var sv=(val==null?'':String(val));
    var known=opts.map(String).indexOf(sv)>=0;
    var extra=(sv&&!known)?'<option value="'+esc(sv)+'" selected>'+esc(sv)+'（既存値）</option>':'';
    var o='<option value=""></option>'+extra+opts.map(function(x){return'<option value="'+esc(x)+'"'+(String(val)===String(x)?' selected':'')+'>'+esc(x)+'</option>'}).join('');
    return'<div class="fld"><label>'+esc(label)+'</label><select data-k="'+k+'">'+o+'</select></div>';
  }
  if(type==='textarea')return'<div class="fld wide"><label>'+esc(label)+'</label><textarea data-k="'+k+'">'+v+'</textarea></div>';
  if(type==='checkbox')return'<div class="fld"><label>'+esc(label)+'</label><select data-k="'+k+'"><option value=""'+(!val?' selected':'')+'>無</option><option value="1"'+(val?' selected':'')+'>有</option></select></div>';
  // ISO でない日付は text で表示（空にして消さない）
  var t=(type||'text');
  if(t==='date'&&val&&!isISODate(val))t='text';
  return'<div class="fld"><label>'+esc(label)+'</label><input data-k="'+k+'" type="'+t+'" value="'+v+'"></div>';
}

/* 将来の自動取込用: 診察結果を srcId で冪等マージ（同一srcId=更新・無ければ追加・date降順）。
   手動入力分(source='manual'・srcId空)は対象外で温存。今回は呼び出し口のみ用意。 */
function importMedicalLog(list,entries){
  list=Array.isArray(list)?list.slice():[];
  (entries||[]).forEach(function(e){
    if(!e)return;
    var sid=e.srcId!=null?String(e.srcId):'';
    var idx=-1;
    if(sid){for(var i=0;i<list.length;i++){if(list[i]&&String(list[i].srcId)===sid){idx=i;break}}}
    var item={date:e.date||'',text:e.text||'',source:e.source||'vma',srcId:sid,doctor:e.doctor||'',clinic:e.clinic||'',importedAt:new Date().toISOString()};
    if(idx>=0)list[idx]=item;else list.push(item);
  });
  list.sort(function(a,b){return String((b&&b.date)||'').localeCompare(String((a&&a.date)||''))});
  return list;
}

function collectForm(){
  var rec={};
  Array.prototype.forEach.call($('editBox').querySelectorAll('[data-k]'),function(inp){
    var k=inp.getAttribute('data-k');var v=inp.value;
    if(k==='active'){rec.active=(v!=='退去');return}
    if(k==='welfare'){rec.welfare=!!v;return}
    rec[k]=(typeof v==='string')?v.trim():v;
  });
  rec.rhythm={};
  Array.prototype.forEach.call($('editBox').querySelectorAll('[data-rhythm]'),function(inp){if(inp.value)rec.rhythm[inp.getAttribute('data-rhythm')]=inp.value});
  // 入力欄が描画されていない場合は既存値を温存する（部分フォームでの全消しを防ぐ安全側フォールバック）
  var duEls=$('editBox').querySelectorAll('[data-dayuse]');
  if(duEls.length){rec.dayUse={};Array.prototype.forEach.call(duEls,function(inp){var v=(inp.value||'').trim();if(v)rec.dayUse[inp.getAttribute('data-dayuse')]=v})}
  else if(editing.dayUse)rec.dayUse=editing.dayUse;
  var csEls=$('editBox').querySelectorAll('[data-consent]');
  if(csEls.length){rec.consents={};Array.prototype.forEach.call(csEls,function(inp){var v=(inp.value||'').trim();if(v)rec.consents[inp.getAttribute('data-consent')]=v})}
  else if(editing.consents)rec.consents=editing.consents;
  rec.targetApps=[];
  Array.prototype.forEach.call($('editBox').querySelectorAll('[data-target]'),function(inp){if(inp.checked)rec.targetApps.push(inp.getAttribute('data-target'))});
  collectMedsPast();
  rec.medsPastLog=editing.medsPastLog.filter(function(s){return s&&(s.date||s.text)});
  collectFam();
  rec.family=editing.family.filter(function(f){return f.name||f.phone||f.address});
  collectSupport();
  rec.supportLog=editing.supportLog.filter(function(s){return s&&(s.date||s.text)});
  // 介護度の変更履歴：手動編集を回収し、介護度が変わっていれば変更前の値を自動スナップショット
  collectCareHist();
  var oldLevel=String(editing.careLevel||'').trim();
  if(oldLevel&&rec.careLevel&&rec.careLevel!==oldLevel){
    editing.careLevelHistory.unshift({value:oldLevel,certStart:editing.careCertStart||'',certEnd:editing.careCertEnd||'',certDate:editing.certDate||'',changedAt:todayISO(),note:'自動記録（変更前）'});
  }
  rec.careLevelHistory=editing.careLevelHistory.filter(function(s){return s&&(s.value||s.changedAt||s.note||s.certStart||s.certEnd)});
  // 医療支援経過（訪問診療の受け皿）
  collectMedLog();
  rec.medicalSupportLog=editing.medicalSupportLog.filter(function(s){return s&&(s.date||s.text)});
  rec.id=editing.id;
  // 訪問診療連携キー（xref.vma.patientId）
  var vmaInp=$('editBox').querySelector('[data-xref-vma-pid]');
  if(vmaInp){var pid=(vmaInp.value||'').trim();editing.xref=editing.xref||{};editing.xref.vma=editing.xref.vma||{};if(pid)editing.xref.vma.patientId=pid;else delete editing.xref.vma.patientId;if(editing.xref.vma&&!Object.keys(editing.xref.vma).length)delete editing.xref.vma;}
  if(editing.xref&&Object.keys(editing.xref).length)rec.xref=editing.xref;
  // 移行時の退避データは画面に入力欄が無いため、rec に引き継がないと保存のたびに消える
  if(editing.unmappedRaw&&editing.unmappedRaw.length)rec.unmappedRaw=editing.unmappedRaw;
  // ホワイトリスト適用
  var clean={};ALLOWED_KEYS.forEach(function(k){if(rec[k]!==undefined)clean[k]=rec[k]});
  return clean;
}

  var rec=collectForm();
  if(!rec.name){toast('⚠️ 氏名は必須です');return}
  if(!CFG.url){toast('⚠️ 同期設定のURLが未設定です');return}
  rec.updatedAt=new Date().toISOString();
  $('saveBtn').disabled=true;setSync('保存中…');
  apiPost({action:'saveResident',record:rec}).then(function(d){
    var saved=(d&&d.record)||d;
    setSync('保存OK','ok');toast('✅ 保存しました');
    // roster を更新（軽量行のみ）
    var row=normRosterRow(saved.id!=null?saved:rec);
    var idx=-1;for(var i=0;i<roster.length;i++){if(String(roster[i].id)===String(row.id)){idx=i;break}}
    if(idx>=0)roster[idx]=row;else roster.push(row);
    saveRosterCache();writeCommonRoster();
    openResident(row.id);
  }).catch(function(e){setSync('保存失敗','err');toast('⚠️ 保存に失敗: '+e.message)}).then(function(){$('saveBtn').disabled=false});
}

/* ═══════════ 画面遷移 ═══════════ */
function showScreen(name){
  ['list','view','edit'].forEach(function(s){var el=$('sc-'+s);if(el)el.classList.toggle('on',s===name)});
  Array.prototype.forEach.call(document.querySelectorAll('.bnav button'),function(b){b.classList.toggle('on',b.getAttribute('data-sc')===name)});
  if(name==='list')window.scrollTo(0,0);
}

/* ═══════════ 端末用途ガード ═══════════ */
function applyDeviceGuard(){
  var blocked=(getDeviceRole()==='field');
  $('deviceBlock').classList.toggle('on',blocked);
  return blocked;
}
/* キャッシュ即時表示＋（URLがあれば）ネット同期。init と端末解除後で共用 */
function loadData(){
  loadRosterCache();renderRoster();
  if(roster.length)writeCommonRoster(); // 共有キーを最新化（他アプリが即参照可）
  if(CFG.url)refreshRoster();else setSync('未接続');
}

/* ═══════════ 同期設定 ═══════════ */
function openSync(){$('cfgUrl').value=CFG.url;$('cfgToken').value=CFG.token;if($('cfgVmaUrl'))$('cfgVmaUrl').value=CFG.vmaUrl||'';if($('cfgDeviceRole'))$('cfgDeviceRole').value=getDeviceRole();$('mSync').classList.add('on')}
function closeSync(){$('mSync').classList.remove('on')}
function saveSyncCfg(){
  CFG.url=$('cfgUrl').value.trim();CFG.token=$('cfgToken').value.trim();
  if($('cfgVmaUrl'))CFG.vmaUrl=$('cfgVmaUrl').value.trim();
  try{localStorage.setItem(CFG_KEY,JSON.stringify(CFG))}catch(e){}
  if($('cfgDeviceRole'))setDeviceRole($('cfgDeviceRole').value);
  closeSync();
  // 現場タブレットに設定された場合は即ブロック。事務所PCなら解除して読み込み。
  if(applyDeviceGuard())return;
  loadData();
}
function testSync(){
  if(!$('cfgUrl').value.trim()){toast('URLを入力してください');return}
  var saved={url:CFG.url,token:CFG.token};CFG.url=$('cfgUrl').value.trim();CFG.token=$('cfgToken').value.trim();
  apiGet({action:'ping'},8000).then(function(){toast('✅ 接続OK')}).catch(function(e){toast('⚠️ 接続失敗: '+e.message)}).then(function(){CFG.url=saved.url;CFG.token=saved.token});
}

/* ═══════════ 初期化 ═══════════ */
function init(){
  // ── 先に全イベントを登録（ブロック中でも「端末設定変更」が機能するように） ──
  $('deviceUnlock').addEventListener('click',function(){$('deviceBlock').classList.remove('on');openSync()});
  $('q').addEventListener('input',renderRoster);
  // 表示パターンのタブ（リロードしても選んだタブが維持される）
  var vtabs=Array.prototype.slice.call($('viewTabs').querySelectorAll('.vtab'));
  vtabs.forEach(function(b,i){
    b.addEventListener('click',function(){setView(this.getAttribute('data-v'))});
    /* role="tab" を名乗る以上、←→で移動できないと支援技術の期待と食い違う */
    b.addEventListener('keydown',function(e){
      var d=(e.key==='ArrowRight'||e.key==='ArrowDown')?1:(e.key==='ArrowLeft'||e.key==='ArrowUp')?-1:0;
      if(!d)return;
      e.preventDefault();
      var n=vtabs[(i+d+vtabs.length)%vtabs.length];
      n.focus(); setView(n.getAttribute('data-v'));
    });
  });
  // 保存された表示パターンのタブ状態だけ先に反映する。
  // ここで描画すると (a) 名簿読込前なので「入居者がいません」が一瞬出る
  // (b) 現場端末ガードで return する経路でも描画してしまう。描画は loadData に任せる。
  paintTabs();
  Array.prototype.forEach.call($('filterRow').querySelectorAll('.chip'),function(c){
    c.addEventListener('click',function(){curFilter=this.getAttribute('data-f');
      Array.prototype.forEach.call($('filterRow').querySelectorAll('.chip'),function(x){x.classList.toggle('on',x===c)});renderRoster()});
  });
  Array.prototype.forEach.call(document.querySelectorAll('.bnav button'),function(b){
    b.addEventListener('click',function(){var sc=this.getAttribute('data-sc');
      if(sc==='new'){openEdit(null)}else if(sc==='sync'){openSync()}else if(sc==='apps'){openApps()}else{showScreen('list')}});
  });
  $('backBtn').addEventListener('click',function(){showScreen('list')});
  $('editBtn').addEventListener('click',function(){if(curResident)openEdit(curResident)});
  $('printBtn').addEventListener('click',function(){window.print()});
  $('editCancel').addEventListener('click',function(){if(curResident)openResident(curResident.id);else showScreen('list')});
  $('saveBtn').addEventListener('click',saveResident);
  $('syncClose').addEventListener('click',closeSync);
  $('appsClose').addEventListener('click',closeApps);
  $('mApps').addEventListener('click',function(e){if(e.target===this)closeApps()});
  $('syncTest').addEventListener('click',testSync);
  $('syncSave').addEventListener('click',saveSyncCfg);
  $('mSync').addEventListener('click',function(e){if(e.target===this)closeSync()});
  // ── 端末用途ガード：現場タブレットはデータを一切読み込まずブロック表示 ──
  if(applyDeviceGuard()){setSync('現場端末','err');return}
  loadData();
}
document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
